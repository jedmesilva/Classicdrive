kind = "mobile"
previewPath = "/"
title = "ClassicDrive"
version = "1.0.0"
id = "artifacts/classicdrive-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20267

[services.development]
run = "pnpm --filter @workspace/classicdrive-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/classicdrive-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/classicdrive-mobile", "run", "serve" ]

[services.env]
PORT = "20267"
BASE_PATH = "/"
